# =============================================================================
# Sandbox Service Configuration
# =============================================================================
# All values below are the defaults. Override by editing this file, or by
# setting environment variables prefixed with SANDBOX_, e.g.:
#   SANDBOX_SERVER_PORT=9090
#   SANDBOX_STORAGE_STATE_REDIS_ADDR=redis:6379
# Nested keys use underscores as separators in env var names, e.g.:
#   SANDBOX_STORAGE_FILESYSTEM_ACCESS_KEY=my-key
# =============================================================================

# -----------------------------------------------------------------------------
# Server — HTTP API server settings
# -----------------------------------------------------------------------------
server:
  # TCP port the HTTP server listens on.
  port: 8080
  # Network interface to bind. Use 0.0.0.0 to listen on all interfaces.
  host: "0.0.0.0"

# -----------------------------------------------------------------------------
# Images — sandbox container images
# -----------------------------------------------------------------------------
images:
  python: "sandbox-python:latest"
  nodejs: "sandbox-nodejs:latest"
  bash: "sandbox-bash:latest"
  gateway: "sandbox-gateway:latest"

# -----------------------------------------------------------------------------
# Runtime — sandbox execution backend
# -----------------------------------------------------------------------------
runtime:
  # Backend type. Supported values: "docker", "kubernetes"
  type: "docker"

  # Docker-specific settings (used when type = "docker")
  docker:
    # Docker daemon socket or TCP address.
    # Leave empty to use the default socket (/var/run/docker.sock on Linux).
    host: ""

  # Kubernetes-specific settings (used when type = "kubernetes")
  kubernetes:
    # Path to the kubeconfig file.
    # Leave empty to use the in-cluster service account credentials.
    kubeconfig: ""
    # Kubernetes namespace where sandbox pods are created.
    namespace: ""

# -----------------------------------------------------------------------------
# Pool — pre-warmed sandbox pool settings
# -----------------------------------------------------------------------------
pool:
  # Minimum number of idle sandboxes to keep ready.
  min_size: 3
  # Maximum number of sandboxes in the pool.
  max_size: 20
  # How often (in seconds) to refill the pool back to min_size.
  refill_interval_seconds: 10

# -----------------------------------------------------------------------------
# Storage — state and object storage backends
# -----------------------------------------------------------------------------
storage:
  # State storage (sandbox lifecycle tracking)
  state:
    redis:
      # Redis server address in host:port format.
      addr: "localhost:6379"
      # Redis authentication password. Leave empty for no authentication.
      password: ""
      # Redis database index (0–15).
      db: 0

  # Filesystem storage (workspace persistent storage)
  filesystem:
    # Storage provider. Supported values: "local", "s3", "cos", "oss", "obs", "minio"
    provider: "local"
    # Bucket name (not used for the "local" provider).
    bucket: ""
    # Storage region (provider-dependent).
    region: ""
    # Custom endpoint URL (optional, for private / compatible storage).
    # For COS, this is the full bucket URL (e.g. "https://bucket-xxx.cos.ap-guangzhou.myqcloud.com").
    endpoint: ""
    # Access key ID.
    access_key: ""
    # Secret access key.
    secret_key: ""
    # Local directory for the "local" provider.
    local_path: "/tmp/sandbox-storage"
    # Sub-path prefix within the bucket / root directory (optional).
    sub_path: ""
    # Use SSL for MinIO connections (only used when provider = "minio").
    use_ssl: false

# -----------------------------------------------------------------------------
# Workspace — workspace sync strategy
# -----------------------------------------------------------------------------
workspace:
  # Automatic sync interval in seconds. When > 0, a background goroutine
  # periodically syncs changed files from containers back to storage,
  # reducing data loss if a container crashes between manual syncs.
  # Set to 0 to disable. Recommended: 30 for long-running agent sessions.
  auto_sync_interval_seconds: 0

# -----------------------------------------------------------------------------
# Security — sandbox isolation and resource limits
# -----------------------------------------------------------------------------
security:
  # API key for authentication. Empty string disables auth.
  api_key: ""
  # Rate limit (requests per second per client IP). 0 = disabled.
  rate_limit: 0
  # Maximum wall-clock time (seconds) allowed for a single execution.
  exec_timeout_seconds: 30
  # Maximum sandbox lifetime in seconds (0 = no limit). Default: 3600 (1 hour).
  sandbox_timeout_seconds: 3600
  # Memory limit per sandbox (e.g. "256Mi", "1Gi").
  max_memory: "256Mi"
  # Disk quota per sandbox (e.g. "100Mi", "1Gi").
  max_disk: "100Mi"
  # Maximum number of processes / threads per sandbox.
  max_pids: 100
  # Whether outbound network access is allowed inside the sandbox.
  network_enabled: false
  # CIDR ranges the sandbox is allowed to reach when network_enabled = true.
  # network_whitelist:
  #   - "10.0.0.0/8"
  #   - "192.168.0.0/16"
  network_whitelist: []
  # Path to a custom seccomp profile JSON file.
  # Leave empty to use the container runtime default profile.
  seccomp_profile: ""
