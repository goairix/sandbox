replicaCount: 2

image:
  repository: sandbox
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Redis configuration
redis:
  # Use the built-in Redis deployment (set to false to use an external Redis)
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  persistence:
    enabled: true
    storageClass: ""
    size: 1Gi
  password: ""
  # External Redis (used when redis.enabled is false)
  external:
    addr: ""
    password: ""
    db: 0

config:
  server:
    port: 8080
  runtime:
    type: kubernetes
    kubernetes:
      # Namespace for sandbox pods. Defaults to the Helm release namespace if empty.
      namespace: ""
  pool:
    minSize: 3
    maxSize: 20
  images:
    sandbox: "sandbox:latest"
    gateway: "sandbox-gateway:latest"
  storage:
    filesystem:
      provider: s3
      bucket: sandbox-storage
      region: us-east-1
      endpoint: ""
      accessKey: ""
      secretKey: ""
      subPath: ""
      useSSL: false
  workspace:
    autoSyncIntervalSeconds: 0
  security:
    apiKey: ""
    rateLimit: 100
    execTimeoutSeconds: 30
    sandboxTimeoutSeconds: 3600
    maxMemory: 256Mi
    maxPids: 100
  telemetry:
    serviceName: "sandbox"
    serviceVersion: "v1.0.0"
    tracer:
      otlpEnabled: false
      otlpEndpoint: ""
    metrics:
      otlpEnabled: false
      otlpEndpoint: ""
    log:
      otlpEnabled: false
      otlpEndpoint: ""

networkPolicy:
  enabled: true
