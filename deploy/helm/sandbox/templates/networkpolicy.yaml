{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-sandbox-default
  namespace: {{ .Release.Namespace }}
  labels:
    app: sandbox
    release: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      sandbox.managed: "true"
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
