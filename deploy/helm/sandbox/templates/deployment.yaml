apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-sandbox
  labels:
    app: sandbox
    release: {{ .Release.Name }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: sandbox
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: sandbox
        release: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-sandbox
      containers:
        - name: sandbox
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.config.server.port }}
              protocol: TCP
          env:
            - name: SANDBOX_SERVER_PORT
              value: "{{ .Values.config.server.port }}"
            - name: SANDBOX_RUNTIME_TYPE
              value: "{{ .Values.config.runtime.type }}"
            - name: SANDBOX_RUNTIME_KUBERNETES_NAMESPACE
              value: "{{ .Values.config.runtime.kubernetes.namespace }}"
            - name: SANDBOX_POOL_MIN_SIZE
              value: "{{ .Values.config.pool.minSize }}"
            - name: SANDBOX_POOL_MAX_SIZE
              value: "{{ .Values.config.pool.maxSize }}"
            - name: SANDBOX_IMAGES_SANDBOX
              value: "{{ .Values.config.images.sandbox }}"
            - name: SANDBOX_IMAGES_GATEWAY
              value: "{{ .Values.config.images.gateway }}"
            - name: SANDBOX_STORAGE_STATE_REDIS_ADDR
              value: "{{ .Values.config.storage.state.redis.addr }}"
            - name: SANDBOX_STORAGE_STATE_REDIS_PASSWORD
              value: "{{ .Values.config.storage.state.redis.password }}"
            - name: SANDBOX_STORAGE_STATE_REDIS_DB
              value: "{{ .Values.config.storage.state.redis.db }}"
            - name: SANDBOX_STORAGE_FILESYSTEM_PROVIDER
              value: "{{ .Values.config.storage.filesystem.provider }}"
            - name: SANDBOX_STORAGE_FILESYSTEM_BUCKET
              value: "{{ .Values.config.storage.filesystem.bucket }}"
            - name: SANDBOX_STORAGE_FILESYSTEM_REGION
              value: "{{ .Values.config.storage.filesystem.region }}"
            - name: SANDBOX_STORAGE_FILESYSTEM_ENDPOINT
              value: "{{ .Values.config.storage.filesystem.endpoint }}"
            - name: SANDBOX_STORAGE_FILESYSTEM_ACCESS_KEY
              value: "{{ .Values.config.storage.filesystem.accessKey }}"
            - name: SANDBOX_STORAGE_FILESYSTEM_SECRET_KEY
              value: "{{ .Values.config.storage.filesystem.secretKey }}"
            - name: SANDBOX_STORAGE_FILESYSTEM_SUB_PATH
              value: "{{ .Values.config.storage.filesystem.subPath }}"
            - name: SANDBOX_STORAGE_FILESYSTEM_USE_SSL
              value: "{{ .Values.config.storage.filesystem.useSSL }}"
            - name: SANDBOX_SECURITY_EXEC_TIMEOUT_SECONDS
              value: "{{ .Values.config.security.execTimeoutSeconds }}"
            - name: SANDBOX_SECURITY_SANDBOX_TIMEOUT_SECONDS
              value: "{{ .Values.config.security.sandboxTimeoutSeconds }}"
            - name: SANDBOX_SECURITY_MAX_MEMORY
              value: "{{ .Values.config.security.maxMemory }}"
            - name: SANDBOX_SECURITY_MAX_PIDS
              value: "{{ .Values.config.security.maxPids }}"
          {{- if .Values.config.security.apiKey }}
            - name: SANDBOX_SECURITY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-sandbox
                  key: api-key
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.config.server.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.config.server.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
