apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-sandbox
  namespace: {{ .Release.Namespace }}
  labels:
    app: sandbox
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.config.server.port }}
      protocol: TCP
      name: http
  selector:
    app: sandbox
    release: {{ .Release.Name }}
