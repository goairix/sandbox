{{- if .Values.config.security.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-sandbox
  namespace: {{ .Release.Namespace }}
  labels:
    app: sandbox
    release: {{ .Release.Name }}
type: Opaque
data:
  api-key: {{ .Values.config.security.apiKey | b64enc | quote }}
{{- end }}
{{- if and .Values.redis.enabled .Values.redis.password }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: sandbox-redis
    release: {{ .Release.Name }}
type: Opaque
data:
  password: {{ .Values.redis.password | b64enc | quote }}
{{- else if and (not .Values.redis.enabled) .Values.redis.external.password }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: sandbox-redis
    release: {{ .Release.Name }}
type: Opaque
data:
  password: {{ .Values.redis.external.password | b64enc | quote }}
{{- end }}
