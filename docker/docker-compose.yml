services:
  sandbox-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SANDBOX_RUNTIME_TYPE=docker
      - SANDBOX_RUNTIME_DOCKER_HOST=unix:///var/run/docker.sock
      - SANDBOX_STORAGE_STATE_REDIS_ADDR=redis:6379
      - SANDBOX_STORAGE_STATE_REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SANDBOX_STORAGE_STATE_REDIS_DB=${REDIS_DB:-0}
      - SANDBOX_STORAGE_FILESYSTEM_PROVIDER=${STORAGE_PROVIDER:-local}
      - SANDBOX_STORAGE_FILESYSTEM_BUCKET=${STORAGE_BUCKET:-}
      - SANDBOX_STORAGE_FILESYSTEM_ENDPOINT=${STORAGE_ENDPOINT:-}
      - SANDBOX_STORAGE_FILESYSTEM_ACCESS_KEY=${STORAGE_ACCESS_KEY:-}
      - SANDBOX_STORAGE_FILESYSTEM_SECRET_KEY=${STORAGE_SECRET_KEY:-}
      - SANDBOX_STORAGE_FILESYSTEM_SUB_PATH=${STORAGE_SUB_PATH:-}
      - SANDBOX_STORAGE_FILESYSTEM_USE_SSL=${STORAGE_USE_SSL:-false}
      - SANDBOX_STORAGE_FILESYSTEM_LOCAL_PATH=${STORAGE_LOCAL_PATH:-/data/storage}
      - SANDBOX_SECURITY_API_KEY=${SECURITY_API_KEY:-***REDACTED_API_KEY***}
      - SANDBOX_SECURITY_SANDBOX_TIMEOUT_SECONDS=${SANDBOX_TIMEOUT_SECONDS:-3600}
      - SANDBOX_POOL_MIN_SIZE=${POOL_MIN_SIZE:-3}
      - SANDBOX_POOL_MAX_SIZE=${POOL_MAX_SIZE:-20}
      - SANDBOX_IMAGES_SANDBOX=sandbox:latest
      - SANDBOX_IMAGES_GATEWAY=sandbox-gateway:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - sandbox-images

  # Build all sandbox images before starting the API server
  sandbox-images:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../docker/images:/images:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        docker build -t sandbox:latest /images/sandbox &&
        docker build -t sandbox-gateway:latest /images/gateway &&
        echo "All sandbox images built successfully"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
