services:
  sandbox-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SANDBOX_RUNTIME_TYPE=docker
      - SANDBOX_RUNTIME_DOCKER_HOST=unix:///var/run/docker.sock
      - SANDBOX_STORAGE_STATE_REDIS_ADDR=redis:6379
      - SANDBOX_STORAGE_FILESYSTEM_PROVIDER=minio
      - SANDBOX_STORAGE_FILESYSTEM_BUCKET=aiadp-dev
      - SANDBOX_STORAGE_FILESYSTEM_ENDPOINT=minio.huaxisy.com
      - SANDBOX_STORAGE_FILESYSTEM_ACCESS_KEY=***REDACTED_ACCESS_KEY***
      - SANDBOX_STORAGE_FILESYSTEM_SECRET_KEY=***REDACTED_SECRET_KEY***
      - SANDBOX_STORAGE_FILESYSTEM_SUB_PATH=workspaces
      - SANDBOX_STORAGE_FILESYSTEM_USE_SSL=true
      - SANDBOX_SECURITY_API_KEY=***REDACTED_API_KEY***
      - SANDBOX_IMAGES_GATEWAY=sandbox-gateway:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox-storage:/data/storage
    depends_on:
      - redis
      - sandbox-images

  # Build all sandbox images before starting the API server
  sandbox-images:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../docker/images:/images:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        docker build -t sandbox-python:latest /images/python &&
        docker build -t sandbox-nodejs:latest /images/nodejs &&
        docker build -t sandbox-bash:latest /images/bash &&
        docker build -t sandbox-gateway:latest /images/gateway &&
        echo "All sandbox images built successfully"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  sandbox-storage:
  redis-data:
